# KSUI — Termux layout + extra keys
# Drop-in for ~/.termux/termux.properties

use-black-ui = true

# Session shortcuts
shortcut.create-session = ctrl + t
shortcut.next-session = ctrl + 2
shortcut.previous-session = ctrl + 1

# Extra keys — 3-row Kashsight layout
extra-keys = [ \
  ['VOL+','VOL-','PGUP','CTRL','TAB','ALT','*','-'], \
  ['MUTE','UP','PGDN','ESC','/','|','{','$'], \
  ['RIGHT','DOWN','LEFT','END','~','HOME','}','_'] \
]
